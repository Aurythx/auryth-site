<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auryth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      width: 100vw; height: 100vh; position: relative; overflow: hidden;
      background: radial-gradient(ellipse at 50% 0%, #14142a 0%, #0a0a18 55%, #050508 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    #flash {
      position: absolute; inset: 0;
      background: rgba(200,160,255,1);
      opacity: 0; pointer-events: none; z-index: 20;
      transition: opacity .05s;
    }
    #scene-layer   { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    #tornado-layer { position: absolute; left: 17%; top: 14%; transform: translateX(-50%); pointer-events: none; z-index: 2; }
    #clouds-layer  { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
    #rain-canvas   { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; display: block; }
    #lightning-svg { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 6; pointer-events: none; }
    #splash-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 7; pointer-events: none; display: block; }
    #ui {
      position: absolute; inset: 0; z-index: 8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #welcome-text {
      font-size: clamp(12px, 1.5vw, 16px);
      letter-spacing: .3em; text-transform: uppercase;
      color: rgba(160,180,255,.75); margin-bottom: .5rem;
      font-weight: 400; position: relative; z-index: 3;
    }
    #title {
      font-size: clamp(52px, 7.5vw, 108px);
      font-weight: 700; letter-spacing: -.01em;
      color: #f0eaff; margin: 0 0 2.8rem; line-height: 1.1;
      text-shadow: 0 0 80px rgba(160,100,255,.55), 0 0 20px rgba(100,120,255,.4);
      display: flex; align-items: flex-end;
    }
    .letter-wrap { position: relative; display: inline-block; }
    .crow-slot {
      position: absolute; bottom: 100%; left: 50%;
      transform: translateX(-50%) translateY(16px);
      pointer-events: none; z-index: 1; display: block;
    }
    .crow { overflow: visible; }
    #enter-btn {
      padding: 20px 60px;
      border: 1.5px solid rgba(200,180,255,.6);
      background: rgba(80,50,120,.15);
      color: #e8d8ff; cursor: pointer;
      font-size: clamp(14px, 1.6vw, 20px);
      letter-spacing: .2em;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
      transition: background .2s, color .2s;
      user-select: none; white-space: nowrap;
      font-family: inherit; outline: none;
    }
    @keyframes ruffle {
      0%   { transform: scaleY(1)    scaleX(1); }
      20%  { transform: scaleY(1.14) scaleX(.93); }
      40%  { transform: scaleY(.94)  scaleX(1.1); }
      60%  { transform: scaleY(1.1)  scaleX(.96); }
      80%  { transform: scaleY(.97)  scaleX(1.05); }
      100% { transform: scaleY(1)    scaleX(1); }
    }
    @keyframes idleBob0 {
      0%, 100% { transform: translateY(0px) rotate(-.5deg); }
      50%      { transform: translateY(-3px) rotate(.5deg); }
    }
    @keyframes idleBob1 {
      0%, 100% { transform: translateY(0px) rotate(.4deg); }
      50%      { transform: translateY(-4px) rotate(-.4deg); }
    }
    @keyframes tornadoSway {
      0%, 100% { transform: rotate(-2.5deg) skewX(-1deg); }
      30%      { transform: rotate(1.5deg)  skewX(1deg); }
      65%      { transform: rotate(-1deg)   skewX(-.5deg); }
    }
  </style>
</head>

const CLOUDS = [
  { top:"-4%", left:"-8%",  width:"62%", spd:38, dir:[ 1, 1], op:.92, delay:0   },

const WORD      = ["A","u","r","y","t","h"];
const CROW_IDXS = [0,3,4,5];
const FLY_DIR   = [

  { tx: 300, ty:-180, rot: 40 },

(function injectKF() {
  const s = document.createElement("style");
  s.textContent += CLOUDS.map((cl, i) => `
    @keyframes cld${i} {
      0%   { transform: translate(0,0); }
      20%  { transform: translate(${cl.dir[0]*25}px,${cl.dir[1]*6}px); }
      45%  { transform: translate(${cl.dir[0]*48}px,${cl.dir[1]*13}px); }
      70%  { transform: translate(${cl.dir[0]*38}px,${cl.dir[1]*8}px); }
      85%  { transform: translate(${cl.dir[0]*18}px,${cl.dir[1]*3}px); }
      100% { transform: translate(0,0); }
    }`).join("");
  s.textContent += CROW_IDXS.map((_, slot) => {
    const fd = FLY_DIR[slot];
    return `
    @keyframes crowFly${slot} {
      0%   { transform:scale(1)   translate(0,0)                                   rotate(0deg);               opacity:1; }
      15%  { transform:scale(2.2) translate(${fd.tx*.15}px,${fd.ty*.2}px)  rotate(${fd.rot*.4}deg);  opacity:1; }
      40%  { transform:scale(5)   translate(${fd.tx*.45}px,${fd.ty*.5}px)  rotate(${fd.rot*.7}deg);  opacity:1; }
      70%  { transform:scale(9)   translate(${fd.tx*.75}px,${fd.ty*.8}px)  rotate(${fd.rot}deg);     opacity:.6; }
      100% { transform:scale(14)  translate(${fd.tx}px,${fd.ty}px)         rotate(${fd.rot*1.2}deg); opacity:0; }
    }`;
  }).join("");
  document.head.appendChild(s);
})();

  cloudsLayer.appendChild(div);
});

function makeCrowSVG(slot, letterIdx) {
  return `<svg viewBox="0 0 80 64" width="62" height="50"
      class="crow" data-slot="${slot}" data-letter="${letterIdx}"
      style="overflow:visible;transform-origin:50% 90%;animation:idleBob${letterIdx%2} ${2.8+letterIdx*0.4}s ease-in-out infinite;">
    <ellipse cx="44" cy="38" rx="21" ry="13" fill="#060606"/>
    <path d="M24,40 Q18,30 22,20 Q28,12 38,14 Q48,12 54,20 Q64,24 62,36 Q60,46 50,48 Q38,52 28,46 Z" fill="#111"/>
    <ellipse cx="24" cy="20" rx="13" ry="12" fill="#111"/>
    <ellipse cx="33" cy="27" rx="10" ry="9"  fill="#111"/>
    <path d="M12,17 Q6,20 5,23 Q9,22 14,22 Z" fill="#2a2816"/>
    <path d="M12,25 Q6,25 5,23 Q9,24 14,24 Z" fill="#1c1a0e"/>
    <circle cx="20" cy="18" r="4"   fill="#f0f0f0"/>
    <circle cx="20" cy="18" r="2.2" fill="#0a0a0a"/>
    <circle cx="18.5" cy="16.5" r=".8" fill="#ffffff"/>
    <path d="M34,22 Q48,15 66,24 Q56,28 44,30 Q38,30 34,33 Z" fill="#181818"/>
    <path d="M34,31 Q48,26 64,33 Q54,36 44,37 Q38,37 34,39 Z" fill="#1c1c1c"/>
    <g class="ruffle-feathers" style="display:none">
      <path d="M22,36 Q18,30 24,26" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M28,40 Q24,34 30,28" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M44,16 Q42,10 46,8"  stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M50,20 Q50,13 54,12" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
    <path d="M60,35 Q72,30 74,40 L70,36 Q68,42 63,40 L61,44 Q58,38 60,35 Z" fill="#0c0c0c"/>
    <path d="M36,28 Q50,24 64,29" stroke="#222" stroke-width="1" fill="none" opacity=".5"/>
    <line x1="36" y1="49" x2="33" y2="57" stroke="#2a2816" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="44" y1="49" x2="41" y2="57" stroke="#2a2816" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M33,57 L26,59 M33,57 L34,62 M33,57 L37,58 M33,57 L30,62"
          stroke="#2a2816" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M41,57 L34,59 M41,57 L42,62 M41,57 L45,58 M41,57 L38,62"
          stroke="#2a2816" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </svg>`;
}

const titleEl = document.getElementById("title");
WORD.forEach((letter, i) => {
  const span = document.createElement("span");
  span.className = "letter-wrap";
  const slot = CROW_IDXS.indexOf(i);
  if (slot !== -1) {
    const crowSlotEl = document.createElement("span");
    crowSlotEl.className = "crow-slot";
    crowSlotEl.innerHTML = makeCrowSVG(slot, i);
    span.appendChild(crowSlotEl);
  }
  span.appendChild(document.createTextNode(letter));
  titleEl.appendChild(span);
});

const rainCanvas   = document.getElementById("rain-canvas");
const splashCanvas = document.getElementById("splash-canvas");
const rainCtx      = rainCanvas.getContext("2d");
const splashCtx    = splashCanvas.getContext("2d");
let drops = [], splashes = [], drips = [];

function resize() {
  rainCanvas.width = splashCanvas.width  = window.innerWidth;
  rainCanvas.height = splashCanvas.height = window.innerHeight;
  drops = Array.from({length:300}, () => ({
    x: Math.random() * rainCanvas.width,
    y: -Math.random() * rainCanvas.height * 0.35,
    len:   Math.random() * 18 + 10,
    speed: Math.random() * 12 + 14,
    opacity: Math.random() * .45 + .15,
  }));
}
resize();
window.addEventListener("resize", resize);

const btn    = document.getElementById("enter-btn");
const BORDER = 6;

function getEdge(d) {
  const r = btn.getBoundingClientRect();
  const inX = d.x >= r.left && d.x <= r.right;
  const inY = d.y >= r.top  && d.y <= r.bottom;
  if (inX && Math.abs(d.y - r.top)    < BORDER) return "top";
  if (inX && Math.abs(d.y - r.bottom) < BORDER) return "bottom";
  if (inY && Math.abs(d.x - r.right)  < BORDER) return "right";
  if (inY && Math.abs(d.x - r.left)   < BORDER) return "left";
  return null;
}
function resetDrop(d) {
  d.y = -(d.len + Math.random() * rainCanvas.height * 0.08);
  d.x = Math.random() * rainCanvas.width;
}

function drawRain() {
  rainCtx.clearRect(0, 0, rainCanvas.width, rainCanvas.height);
  rainCtx.strokeStyle = "#a8c8e8";
  rainCtx.lineWidth   = 1;
  for (const d of drops) {
    const fadeIn = Math.min(1, Math.max(0, (d.y + d.len) / (rainCanvas.height * 0.12)));
    rainCtx.globalAlpha = d.opacity * fadeIn;
    rainCtx.beginPath();
    rainCtx.moveTo(d.x, d.y);
    rainCtx.lineTo(d.x - d.len * .2, d.y + d.len);
    rainCtx.stroke();
    d.y += d.speed;
    d.x -= d.speed * .2;
    const e = getEdge(d);
    const r = btn.getBoundingClientRect();
    if (e === "top")    { splashes.push({x:d.x,y:d.y,r:0,opacity:.9,edge:"top"});   resetDrop(d); continue; }
    if (e === "right")  { splashes.push({x:d.x,y:d.y,r:0,opacity:.9,edge:"right"}); resetDrop(d); continue; }
    if (e === "bottom") { drips.push({x:d.x,y:r.bottom,vx:-.4,vy:1.2,size:Math.random()*2.5+2,opacity:.85,trail:0}); resetDrop(d); continue; }
    if (e === "left")   { drips.push({x:r.left,y:d.y,vx:-2.5,vy:1.8,size:Math.random()*2+1.5,opacity:.8,trail:0}); resetDrop(d); continue; }
    if (d.y > rainCanvas.height) resetDrop(d);
    if (d.x < 0) d.x = rainCanvas.width;
  }
  rainCtx.globalAlpha = 1;
  requestAnimationFrame(drawRain);
}

function drawFX() {
  splashCtx.clearRect(0, 0, splashCanvas.width, splashCanvas.height);
  for (let i = splashes.length - 1; i >= 0; i--) {
    const s = splashes[i];
    splashCtx.globalAlpha = s.opacity;
    splashCtx.strokeStyle = "#b0d8f5";
    splashCtx.lineWidth   = 1.2;
    if (s.edge === "top") {
      splashCtx.beginPath();
      splashCtx.ellipse(s.x, s.y, s.r*2, s.r*.45, 0, 0, Math.PI*2);
      splashCtx.stroke();
      for (let j = 0; j < 5; j++) {
        const a = -Math.PI*.15 + (j/4)*Math.PI*-.7;
        splashCtx.beginPath();
        splashCtx.arc(s.x+Math.cos(a)*s.r*1.6, s.y+Math.sin(a)*s.r*1.6, 1.5, 0, Math.PI*2);
        splashCtx.fillStyle = "#a8d8f0"; splashCtx.fill();
      }
    } else {
      splashCtx.beginPath();
      splashCtx.ellipse(s.x, s.y, s.r*.45, s.r*2, 0, 0, Math.PI*2);
      splashCtx.stroke();
      for (let j = 0; j < 5; j++) {
        const a = -Math.PI*.35 + (j/4)*Math.PI*.7;
        splashCtx.beginPath();
        splashCtx.arc(s.x+Math.cos(a)*s.r*1.6, s.y+Math.sin(a)*s.r*1.6, 1.5, 0, Math.PI*2);
        splashCtx.fillStyle = "#a8d8f0"; splashCtx.fill();
      }
    }
    s.r += 1.8; s.opacity -= .04;
    if (s.opacity <= 0) splashes.splice(i, 1);
  }
  for (let i = drips.length - 1; i >= 0; i--) {
    const dr = drips[i];
    splashCtx.globalAlpha = dr.opacity;
    const g = splashCtx.createRadialGradient(dr.x, dr.y, 0, dr.x, dr.y, dr.size*2);
    g.addColorStop(0,  "rgba(160,210,240,.9)");
    g.addColorStop(.5, "rgba(130,190,225,.6)");
    g.addColorStop(1,  "rgba(100,170,210,0)");
    splashCtx.beginPath();
    splashCtx.arc(dr.x, dr.y, dr.size, 0, Math.PI*2);
    splashCtx.fillStyle = g; splashCtx.fill();
    splashCtx.strokeStyle = "rgba(160,210,240,.35)";
    splashCtx.lineWidth   = dr.size * .7;
    splashCtx.beginPath();
    splashCtx.moveTo(dr.x, dr.y);
    splashCtx.lineTo(
      dr.x - dr.vx*(dr.size*3+dr.trail*.5)*.4,
      dr.y - dr.vy*(dr.size*3+dr.trail*.5)*.4
    );
    splashCtx.stroke();
    dr.x += dr.vx; dr.y += dr.vy; dr.vy += .12; dr.trail++; dr.opacity -= .025;
    if (dr.opacity <= 0) drips.splice(i, 1);
  }
  splashCtx.globalAlpha = 1;
  requestAnimationFrame(drawFX);
}

drawRain();
drawFX();

const lightSVG = document.getElementById("lightning-svg");
const flashEl  = document.getElementById("flash");

function genSegs(endY, spread) {
  spread = spread || 90;
  const s = []; let cy = 0;
  while (cy < endY) {
    const l = Math.random()*40+15;
    const seg = { dx:(Math.random()-.5)*spread, dy:Math.min(l, endY-cy) };
    s.push(seg); cy += seg.dy;
  }
  return s;
}
function pathStr(sx, sy, segs) {
  let cx=sx, cy=sy, d=`M ${cx} ${cy}`;
  for (const s of segs) { cx+=s.dx; cy+=s.dy; d+=` L ${cx} ${cy}`; }
  return d;
}
function genForks(main, sx) {
  const f=[]; let cx=sx, cy=0;
  for (const seg of main) {
    cx+=seg.dx; cy+=seg.dy;
    if (Math.random()<.38 && cy>30) {
      f.push({sx:cx,sy:cy,segs:genSegs((Math.random()*.35+.1)*window.innerHeight*.65, 60)});
      if (Math.random()<.4)
        f.push({sx:cx+(Math.random()-.5)*20, sy:cy+15, segs:genSegs((Math.random()*.2+.08)*window.innerHeight*.65, 40)});
    }
  }
  return f;
}
function mkPath(d, stroke, sw, opacity) {
  const p = document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d", d);
  p.setAttribute("stroke", stroke);
  p.setAttribute("stroke-width", sw);
  p.setAttribute("fill", "none");
  p.setAttribute("stroke-linecap", "round");
  p.setAttribute("stroke-linejoin", "round");
  if (opacity != null && opacity < 1) p.setAttribute("opacity", opacity);
  return p;
}

function strike() {
  const palette = PALETTES[Math.floor(Math.random()*PALETTES.length)];
  const sy = (Math.random()*.10+.18)*window.innerHeight;
  const sx = (Math.random()*75+10)/100*window.innerWidth;
  const main  = genSegs((window.innerHeight-sy)*.7, 90);
  const forks = genForks(main, sx);
  const w     = Math.random()*2+1.5;
  const [glow,core,tip,white] = palette;
  const md = pathStr(sx, sy, main);
  const g = document.createElementNS("http://www.w3.org/2000/svg","g");
  g.appendChild(mkPath(md, glow,  w*10,  null));
  g.appendChild(mkPath(md, core,  w*4,   null));
  g.appendChild(mkPath(md, tip,   w*1.8, null));
  g.appendChild(mkPath(md, white, w*.7,  null));
  for (const fk of forks) {
    const fd = pathStr(fk.sx, fk.sy, fk.segs);
    const fg = document.createElementNS("http://www.w3.org/2000/svg","g");
    fg.appendChild(mkPath(fd, core,  w*3,   .7));
    fg.appendChild(mkPath(fd, tip,   w*1.4, .85));
    fg.appendChild(mkPath(fd, white, w*.5,  .9));
    g.appendChild(fg);
  }
  lightSVG.appendChild(g);
  const fl = Math.random()*.12+.08;
  flashEl.style.opacity = fl;
  setTimeout(()=>{ flashEl.style.opacity = fl*.4;  }, 60);
  setTimeout(()=>{ flashEl.style.opacity = fl*.75; }, 130);
  setTimeout(()=>{ flashEl.style.opacity = 0;      }, 210);
  setTimeout(()=>{ if (g.parentNode) lightSVG.removeChild(g); }, 440);
}

function schedLightning() {
  setTimeout(() => {
    strike();
    if (Math.random() > .55) setTimeout(strike, 200);
    if (Math.random() > .80) setTimeout(strike, 380);
    schedLightning();
  }, Math.random()*5000+2500);
}
schedLightning();

function schedRuffle(crowEl) {
  setTimeout(() => {
    const rf = crowEl.querySelector(".ruffle-feathers");
    if (rf) rf.style.display = "block";
    const li = parseInt(crowEl.dataset.letter);
    crowEl.style.animation       = "ruffle 0.7s ease-in-out";
    crowEl.style.transformOrigin = "50% 90%";
    setTimeout(() => {
      if (rf) rf.style.display = "none";
      crowEl.style.animation = `idleBob${li%2} ${2.8+li*0.4}s ease-in-out infinite`;
      schedRuffle(crowEl);
    }, 700);
  }, Math.random()*6000+3000);
}
document.querySelectorAll(".crow").forEach(el => schedRuffle(el));

let isFlying = false;
btn.addEventListener("click", () => {
  if (isFlying) return;
  isFlying = true;
  btn.style.background = "rgba(120,60,200,.4)";
  document.querySelectorAll(".crow").forEach(el => {
    const slot = parseInt(el.dataset.slot);
    el.style.animation       = `crowFly${slot} 1.4s cubic-bezier(.2,.6,.4,1) forwards`;
    el.style.transformOrigin = "50% 90%";
  });
  setTimeout(() => {
    isFlying = false;
    btn.style.background = "rgba(80,50,120,.15)";
    document.querySelectorAll(".crow").forEach(el => {
      const li = parseInt(el.dataset.letter);
      el.style.animation       = `idleBob${li%2} ${2.8+li*0.4}s ease-in-out infinite`;
      el.style.transformOrigin = "50% 90%";
    });
  }, 2000);
});
</script>
