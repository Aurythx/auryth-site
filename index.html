<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auryth — Crows Wake</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: radial-gradient(circle at center, #111, #000);
    }
    h1 {
      font-size: 3rem;
      letter-spacing: 2px;
    }
    p {
      opacity: 0.7;
    }
    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      border: 1px solid white;
      background: transparent;
      color: white;
      cursor: pointer;
    }
    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>AURYTH</h1>
    <p>Welcome to the Crows Wake</p>
    <button class="btn">Enter</button>
  </div>
</body>
</html>
